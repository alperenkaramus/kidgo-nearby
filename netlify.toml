[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/google-places"
  to = "/.netlify/functions/google-places"
  status = 200

[[redirects]]
  from = "/en"
  to = "/things-to-do-with-kids/"
  status = 301

[[redirects]]
  from = "/tr"
  to = "/cocukla-gezilecek-yerler/"
  status = 301

[[redirects]]
  from = "/ru"
  to = "/ru/kuda-poiti-s-detmi/"
  status = 301

[[redirects]]
  from = "/de"
  to = "/de/aktivitaeten-mit-kindern/"
  status = 301

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
